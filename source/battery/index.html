<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Battery Manager</title>
<link rel="stylesheet" href="common.css">
<style>
  body.battery-skin { --page-accent: #16A34A; --page-accent-soft: rgba(22, 163, 74, 0.12);
    background: linear-gradient(180deg, var(--page-accent-soft) 0%, var(--surface) 28%); }
  body.battery-skin .mod-header .icon { background: linear-gradient(145deg, var(--page-accent-soft), var(--surface-container)); box-shadow: var(--shadow-md); }
  body.battery-skin .info-card h3 { color: var(--page-accent); }
  body.battery-skin .api-name { background: var(--page-accent-soft); color: var(--page-accent); }
  body.battery-skin .example-list li { border-left-color: var(--page-accent); }
  body.battery-skin .badge { background: var(--page-accent-soft); color: var(--page-accent); }
</style>
</head>
<body class="battery-skin">
<div class="mod-header">
  <div class="icon">🔋</div>
  <h2 data-i18n="title"></h2>
  <p data-i18n="desc"></p>
  <p class="text-center mt-8"><span class="badge" data-i18n="module_badge"></span></p>
</div>
<div class="info-card">
  <h3 data-i18n="features_title"></h3>
  <div class="feature-grid">
    <div class="feature-item"><span class="emoji" aria-hidden="true">🔌</span><span data-i18n="feat_1"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">⚡</span><span data-i18n="feat_2"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">💚</span><span data-i18n="feat_3"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🌡️</span><span data-i18n="feat_4"></span></div>
  </div>
</div>
<div class="info-card">
  <h3 data-i18n="api_title"></h3>
  <ul class="api-list">
    <li><span class="api-name">getBatteryStatus</span> — <span data-i18n="api_status"></span></li>
    <li><span class="api-name">getBatteryHealth</span> — <span data-i18n="api_health"></span></li>
    <li><span class="api-name">getPowerSummary</span> — <span data-i18n="api_summary"></span></li>
  </ul>
</div>
<div class="info-card">
  <h3 data-i18n="examples_title"></h3>
  <ul class="example-list">
    <li data-i18n="ex1"></li>
    <li data-i18n="ex2"></li>
    <li data-i18n="ex3"></li>
    <li data-i18n="ex4"></li>
  </ul>
  <h3 class="mt-12" data-i18n="usage_title"></h3>
  <p class="text-muted mt-8" data-i18n="usage_desc"></p>
</div>
<div class="info-card">
  <h3 data-i18n="about_title"></h3>
  <div class="about-row"><span class="label" data-i18n="about_dev_label"></span><span class="value" data-i18n="about_dev"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_ver_label"></span><span class="value" data-i18n="about_ver"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_perm_label"></span><span class="value" data-i18n="about_permissions"></span></div>
</div>
<script>
var _lang = 'zh';
var i18n = {
  zh: {
    title: '电池管理',
    desc: '查看电池电量、充电状态、健康状况、温度等详细信息',
    api_title: '功能接口',
    api_status: '获取当前电池电量、状态、健康、温度、电压、技术类型、供电方式',
    api_health: '电池健康报告：健康状态、温度提示、循环次数估算说明',
    api_summary: '汇总电池状态，便于查看',
    usage_title: '使用方式',
    usage_desc: '在对话中用自然语言描述你的需求，AI 会自动调用本模块的功能。',
    module_badge: '电源与电池',
    features_title: '核心能力',
    feat_1: '电量与续航',
    feat_2: '充电状态',
    feat_3: '健康检查',
    feat_4: '温度监测',
    examples_title: '使用示例',
    ex1: '「当前电量多少」→ 调用 getBatteryStatus 返回百分比与是否充电',
    ex2: '「电池健康怎么样」→ 使用 getBatteryHealth 查看健康与温度提示',
    ex3: '「给我一份电源概览」→ getPowerSummary 一句话汇总',
    ex4: '「是不是在快充」→ 从 getBatteryStatus / getPowerSummary 读取充电与电源类型',
    about_title: '关于本模块',
    about_dev_label: '开发者',
    about_dev: 'PandaGenie',
    about_ver_label: '版本',
    about_ver: '1.0.0',
    about_perm_label: '权限说明',
    about_permissions: '读取电池与电源相关系统信息（因系统而异）'
  },
  en: {
    title: 'Battery Manager',
    desc: 'View battery level, charging status, health, temperature and more',
    api_title: 'API Reference',
    api_status: 'Get battery level, status, health, temperature, voltage, technology, power source',
    api_health: 'Battery health report: health status, temperature warning, cycle count info',
    api_summary: 'Power summary for quick overview',
    usage_title: 'How to Use',
    usage_desc: 'Describe what you need in the chat, and the AI will automatically use this module.',
    module_badge: 'Power & battery',
    features_title: 'Highlights',
    feat_1: 'Level & runtime',
    feat_2: 'Charging',
    feat_3: 'Health',
    feat_4: 'Temperature',
    examples_title: 'Examples',
    ex1: '“What’s my battery now?” → getBatteryStatus for % and charging',
    ex2: '“Is my battery healthy?” → getBatteryHealth for status and temperature hints',
    ex3: '“Give me a power overview” → getPowerSummary in one call',
    ex4: '“Am I on fast charge?” → charging / power from getBatteryStatus or getPowerSummary',
    about_title: 'About',
    about_dev_label: 'Developer',
    about_dev: 'PandaGenie',
    about_ver_label: 'Version',
    about_ver: '1.0.0',
    about_perm_label: 'Permissions',
    about_permissions: 'Battery and power information exposed by the system (varies by OS).'
  }
};
function applyI18n() {
  var l = (typeof _lang !== 'undefined' && i18n[_lang]) ? _lang : 'en';
  var t = i18n[l] || i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (t[k]) el.textContent = t[k];
  });
}
try { _lang = NativeBridge.getLanguage().substring(0,2); } catch(e) {
  _lang = navigator.language.substring(0,2) === 'zh' ? 'zh' : 'en';
}
applyI18n();
</script>
</body>
</html>
