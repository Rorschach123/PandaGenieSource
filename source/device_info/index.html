<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Device Info</title>
<link rel="stylesheet" href="common.css">
<style>
.mod-header { text-align: center; padding: 24px 0 16px; }
.mod-header .icon { font-size: 48px; margin-bottom: 8px; }
.mod-header h2 { margin: 0; font-size: 20px; }
.mod-header p { font-size: 13px; color: var(--on-surface-variant); margin-top: 4px; }
.info-card { background: var(--surface-container); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.info-card h3 { font-size: 15px; margin: 0 0 8px; color: var(--primary); }
.info-card p { font-size: 13px; color: var(--on-surface-variant); margin: 0; line-height: 1.6; }
.api-list { list-style: none; padding: 0; margin: 0; }
.api-list li { padding: 8px 0; border-bottom: 1px solid var(--outline-variant); font-size: 13px; }
.api-list li:last-child { border-bottom: none; }
.api-name { font-weight: 600; color: var(--primary); }
</style>
</head>
<body>
<div class="mod-header">
  <div class="icon">📱</div>
  <h2 data-i18n="title"></h2>
  <p data-i18n="desc"></p>
</div>
<div class="info-card">
  <h3 data-i18n="api_title"></h3>
  <ul class="api-list">
    <li><span class="api-name">getDeviceInfo</span> — <span data-i18n="api_getDeviceInfo"></span></li>
    <li><span class="api-name">getCpuInfo</span> — <span data-i18n="api_getCpuInfo"></span></li>
    <li><span class="api-name">getMemoryInfo</span> — <span data-i18n="api_getMemoryInfo"></span></li>
    <li><span class="api-name">getStorageInfo</span> — <span data-i18n="api_getStorageInfo"></span></li>
    <li><span class="api-name">getDisplayInfo</span> — <span data-i18n="api_getDisplayInfo"></span></li>
    <li><span class="api-name">getSystemSummary</span> — <span data-i18n="api_getSystemSummary"></span></li>
  </ul>
</div>
<div class="info-card">
  <h3 data-i18n="usage_title"></h3>
  <p data-i18n="usage_desc"></p>
</div>
<script>
var _lang = 'zh';
var i18n = {
  zh: {
    title: '设备信息',
    desc: '查看设备型号、CPU、内存、存储、屏幕等系统信息',
    api_title: '功能接口',
    api_getDeviceInfo: '获取品牌、型号、制造商、Android 版本、SDK 级别、构建号与系统指纹等基础信息，用户说【设备信息】【手机型号】【系统版本】时使用',
    api_getCpuInfo: '读取 /proc/cpuinfo 并返回处理器数量与架构等 CPU 信息，用户说【CPU】【处理器】【几核】时使用',
    api_getMemoryInfo: '通过 ActivityManager 获取内存总量、可用、已用与占用比例，用户说【内存】【运存】【RAM】时使用',
    api_getStorageInfo: '使用 StatFs 与 Environment 获取内部存储与外部主存储的总空间、可用与已用，用户说【存储】【空间】【硬盘】时使用',
    api_getDisplayInfo: '通过 WindowManager 与 DisplayMetrics 获取屏幕宽高、密度、densityDpi 与刷新率，用户说【屏幕】【分辨率】【刷新率】时使用',
    api_getSystemSummary: '一次调用汇总设备、CPU、内存、存储与屏幕信息，用户说【设备概况】【整机信息】时使用',
    usage_title: '使用方式',
    usage_desc: '在对话中用自然语言描述你的需求，AI 会自动调用本模块的功能。'
  },
  en: {
    title: 'Device Info',
    desc: 'View model, CPU, memory, storage, display, and other system information',
    api_title: 'API Reference',
    api_getDeviceInfo: 'Brand, model, manufacturer, Android version, SDK level, build, fingerprint, etc. Use when the user asks for device info, phone model, or OS version',
    api_getCpuInfo: 'Read /proc/cpuinfo for core count, architecture, etc. Use when the user asks about CPU, processor, or core count',
    api_getMemoryInfo: 'Via ActivityManager: total, available, used, and usage ratio. Use when the user asks about memory, RAM, etc.',
    api_getStorageInfo: 'Via StatFs and Environment: internal and primary external total, free, and used. Use when the user asks about storage or disk space',
    api_getDisplayInfo: 'Via WindowManager and DisplayMetrics: size, density, densityDpi, refresh rate. Use when the user asks about screen, resolution, or refresh rate',
    api_getSystemSummary: 'One call summarizing device, CPU, memory, storage, and display. Use when the user asks for an overview or full device summary',
    usage_title: 'How to Use',
    usage_desc: 'Describe what you need in the chat, and the AI will automatically use this module.'
  }
};
function applyI18n() {
  var l = (typeof _lang !== 'undefined' && i18n[_lang]) ? _lang : 'en';
  var t = i18n[l] || i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (t[k]) el.textContent = t[k];
  });
}
try { _lang = NativeBridge.getLanguage().substring(0,2); } catch(e) {
  _lang = navigator.language.substring(0,2) === 'zh' ? 'zh' : 'en';
}
applyI18n();
</script>
</body>
</html>
