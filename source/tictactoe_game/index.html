<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>井字棋</title>
<link rel="stylesheet" href="common.css">
<script>
var _lang = (window.NativeBridge && NativeBridge.getLanguage()) || 'zh';
var isEn = _lang.startsWith('en');
function t(zhText, enText) { return isEn ? enText : zhText; }
document.addEventListener('DOMContentLoaded', function() {
  document.title = t('井字棋', 'Tic-Tac-Toe');
  var el;
  if ((el = document.getElementById('headerTitle'))) el.textContent = t('井字棋', 'Tic-Tac-Toe');
  if ((el = document.getElementById('headerSub'))) el.textContent = t('你: X (先手) | 程序: O', 'You: X (First) | AI: O');
  if ((el = document.getElementById('menuDesc'))) el.textContent = t('与程序对战的经典井字棋', 'Classic Tic-Tac-Toe against AI');
  if ((el = document.getElementById('btnStart'))) el.textContent = t('开始游戏', 'Start Game');
  if ((el = document.getElementById('statusText'))) el.textContent = t('轮到你了', 'Your turn');
  if ((el = document.getElementById('btnRestart'))) el.textContent = t('重新开始', 'Restart');
  if ((el = document.getElementById('btnMenu'))) el.textContent = t('返回菜单', 'Back to Menu');
});
</script>
<style>
.game-header { text-align: center; padding: 16px 0 12px; }
.game-header .icon { font-size: 48px; }
.game-header h2 { margin: 6px 0 0; font-size: 20px; }
.game-header p { font-size: 13px; color: var(--on-surface-variant); margin-top: 4px; }
.board {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 6px; max-width: 280px; margin: 0 auto 16px;
}
.cell {
  aspect-ratio: 1; border: 2px solid var(--outline); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; font-weight: 700; cursor: pointer;
  background: var(--surface); transition: all 0.2s;
  user-select: none;
}
.cell:active { background: var(--surface-variant); }
.cell.x { color: var(--primary); }
.cell.o { color: var(--tertiary); }
.cell.win { background: var(--primary-container); }
.status {
  text-align: center; font-size: 16px; font-weight: 600;
  margin-bottom: 16px; min-height: 24px;
}
.result-card {
  text-align: center; padding: 20px;
  background: var(--primary-container); border-radius: 14px;
  margin-bottom: 12px;
}
.result-card h3 { font-size: 18px; color: var(--primary); margin-bottom: 8px; }
.result-card .emoji { font-size: 48px; margin-bottom: 8px; }
.hidden { display: none; }
.actions { text-align: center; }
</style>
</head>
<body>
<div class="game-header">
  <div class="icon">❌⭕</div>
  <h2 id="headerTitle">井字棋</h2>
  <p id="headerSub">你: X (先手) | 程序: O</p>
</div>

<div id="menuScreen">
  <div class="card" style="text-align:center">
    <p id="menuDesc" style="margin-bottom:14px">与程序对战的经典井字棋</p>
    <button id="btnStart" class="btn btn-primary" onclick="startGame()">开始游戏</button>
  </div>
</div>

<div id="gameScreen" class="hidden">
  <div class="status" id="statusText">轮到你了</div>
  <div class="board" id="board"></div>
  <div id="resultCard" class="result-card hidden">
    <div class="emoji" id="resultEmoji"></div>
    <h3 id="resultText"></h3>
  </div>
  <div class="actions">
    <button id="btnRestart" class="btn btn-primary" onclick="restartGame()">重新开始</button>
    <button id="btnMenu" class="btn btn-outline" style="margin-left:8px" onclick="backToMenu()">返回菜单</button>
  </div>
</div>

<script>
function callPlugin(a, p) {
  if (window.NativeBridge) return JSON.parse(NativeBridge.invoke(a, JSON.stringify(p||{})));
  return null;
}

function startGame() {
  var r = callPlugin('startGame', {});
  if (r && r.success) { showScreen('gameScreen'); updateDisplay(JSON.parse(r.output)); }
}

function updateDisplay(s) {
  var boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  var b = s.board;
  for (var r = 0; r < 3; r++) {
    for (var c = 0; c < 3; c++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      var val = b[r][c];
      if (val === 'X') { cell.textContent = 'X'; cell.classList.add('x'); }
      else if (val === 'O') { cell.textContent = 'O'; cell.classList.add('o'); }
      cell.dataset.row = r;
      cell.dataset.col = c;
      if (!s.gameOver && val === '.') {
        cell.addEventListener('click', function() {
          placeMark(parseInt(this.dataset.row), parseInt(this.dataset.col));
        });
      }
      boardEl.appendChild(cell);
    }
  }

  var statusEl = document.getElementById('statusText');
  var resultCard = document.getElementById('resultCard');

  if (s.gameOver) {
    resultCard.classList.remove('hidden');
    var emoji = document.getElementById('resultEmoji');
    var text = document.getElementById('resultText');
    if (s.winner === 'player') {
      emoji.textContent = '🎉'; text.textContent = t('恭喜你赢了！', 'You win!');
      statusEl.textContent = t('你赢了！', 'You win!');
    } else if (s.winner === 'ai') {
      emoji.textContent = '🤖'; text.textContent = t('程序获胜！', 'AI wins!');
      statusEl.textContent = t('程序赢了', 'AI wins!');
    } else {
      emoji.textContent = '🤝'; text.textContent = t('平局！', 'Draw!');
      statusEl.textContent = t('平局', 'Draw!');
    }
  } else {
    resultCard.classList.add('hidden');
    statusEl.textContent = t('轮到你了，点击空格落子', 'Your turn, tap an empty cell');
  }
}

function placeMark(row, col) {
  var r = callPlugin('placeMark', {row:row, col:col});
  if (r && r.success) updateDisplay(JSON.parse(r.output));
}

function restartGame() {
  var r = callPlugin('restart', {});
  if (r && r.success) updateDisplay(JSON.parse(r.output));
}

function backToMenu() { showScreen('menuScreen'); }

function showScreen(id) {
  ['menuScreen','gameScreen'].forEach(function(s){
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}
</script>
</body>
</html>
