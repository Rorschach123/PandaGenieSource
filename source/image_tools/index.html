<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Image Tools</title>
<link rel="stylesheet" href="common.css">
<style>
  body.image-skin { --page-accent: #DB2777; --page-accent-soft: rgba(219, 39, 119, 0.1);
    background: linear-gradient(180deg, var(--page-accent-soft) 0%, var(--surface) 30%); }
  body.image-skin .mod-header .icon { background: linear-gradient(145deg, var(--page-accent-soft), var(--warning-container)); }
  body.image-skin .info-card h3 { color: var(--page-accent); }
  body.image-skin .api-name { background: var(--page-accent-soft); color: var(--page-accent); }
  body.image-skin .example-list li { border-left-color: var(--page-accent); }
  body.image-skin .badge { background: var(--page-accent-soft); color: var(--page-accent); }
</style>
</head>
<body class="image-skin">
<div class="mod-header">
  <div class="icon">🖼️</div>
  <h2 data-i18n="title"></h2>
  <p data-i18n="desc"></p>
  <p class="text-center mt-8"><span class="badge" data-i18n="module_badge"></span></p>
</div>
<div class="info-card">
  <h3 data-i18n="features_title"></h3>
  <div class="feature-grid">
    <div class="feature-item"><span class="emoji" aria-hidden="true">ℹ️</span><span data-i18n="feat_1"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">↔️</span><span data-i18n="feat_2"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🗜️</span><span data-i18n="feat_3"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🔁</span><span data-i18n="feat_4"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🔃</span><span data-i18n="feat_5"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">✂️</span><span data-i18n="feat_6"></span></div>
  </div>
</div>
<div class="info-card">
  <h3 data-i18n="api_title"></h3>
  <ul class="api-list">
    <li><span class="api-name">getImageInfo</span> — <span data-i18n="api_getImageInfo"></span></li>
    <li><span class="api-name">resizeImage</span> — <span data-i18n="api_resizeImage"></span></li>
    <li><span class="api-name">compressImage</span> — <span data-i18n="api_compressImage"></span></li>
    <li><span class="api-name">convertFormat</span> — <span data-i18n="api_convertFormat"></span></li>
    <li><span class="api-name">rotateImage</span> — <span data-i18n="api_rotateImage"></span></li>
    <li><span class="api-name">cropImage</span> — <span data-i18n="api_cropImage"></span></li>
  </ul>
</div>
<div class="info-card">
  <h3 data-i18n="examples_title"></h3>
  <ul class="example-list">
    <li data-i18n="ex1"></li>
    <li data-i18n="ex2"></li>
    <li data-i18n="ex3"></li>
    <li data-i18n="ex4"></li>
  </ul>
  <h3 class="mt-12" data-i18n="usage_title"></h3>
  <p class="text-muted mt-8" data-i18n="usage_desc"></p>
</div>
<div class="info-card">
  <h3 data-i18n="about_title"></h3>
  <div class="about-row"><span class="label" data-i18n="about_dev_label"></span><span class="value" data-i18n="about_dev"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_ver_label"></span><span class="value" data-i18n="about_ver"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_perm_label"></span><span class="value" data-i18n="about_permissions"></span></div>
</div>
<script>
var _lang = 'zh';
var i18n = {
  zh: {
    title: '图片工具',
    desc: '图片信息查看、缩放、压缩、格式转换、旋转、裁剪',
    api_title: '功能接口',
    api_getImageInfo: '获取图片信息：宽高、格式、文件大小、EXIF（方向、日期、GPS 等）',
    api_resizeImage: '将图片缩放到指定宽高并保存',
    api_compressImage: '压缩图片以减小体积；quality 对 JPEG/WEBP 有效',
    api_convertFormat: '在 PNG、JPG、WEBP 之间转换格式',
    api_rotateImage: '按角度旋转图片（90/180/270）',
    api_cropImage: '按矩形区域裁剪图片（坐标相对原图）',
    usage_title: '使用方式',
    usage_desc: '在对话中用自然语言描述你的需求，AI 会自动调用本模块的功能。',
    module_badge: '图像处理',
    features_title: '核心能力',
    feat_1: '信息/EXIF',
    feat_2: '尺寸调整',
    feat_3: '压缩',
    feat_4: '格式互转',
    feat_5: '旋转',
    feat_6: '裁剪',
    examples_title: '使用示例',
    ex1: '「这张图多大、有没有 GPS」→ getImageInfo',
    ex2: '「把图缩成宽 1080」→ resizeImage',
    ex3: '「压成 200KB 以内发微信」→ compressImage',
    ex4: '「转 PNG」或「横过来」→ convertFormat / rotateImage',
    about_title: '关于本模块',
    about_dev_label: '开发者',
    about_dev: 'PandaGenie',
    about_ver_label: '版本',
    about_ver: '1.0.0',
    about_perm_label: '权限说明',
    about_permissions: '读取与写入您指定的图片文件路径'
  },
  en: {
    title: 'Image Tools',
    desc: 'View image metadata, resize, compress, convert format, rotate, and crop',
    api_title: 'API Reference',
    api_getImageInfo: 'Image info: dimensions, format, file size, EXIF (orientation, date, GPS, etc.)',
    api_resizeImage: 'Scale image to target width/height and save',
    api_compressImage: 'Compress to reduce size; quality applies to JPEG/WEBP',
    api_convertFormat: 'Convert between PNG, JPG, and WEBP',
    api_rotateImage: 'Rotate by angle (90/180/270)',
    api_cropImage: 'Crop to a rectangle (coordinates relative to original)',
    usage_title: 'How to Use',
    usage_desc: 'Describe what you need in the chat, and the AI will automatically use this module.',
    module_badge: 'Imaging',
    features_title: 'Highlights',
    feat_1: 'Info & EXIF',
    feat_2: 'Resize',
    feat_3: 'Compress',
    feat_4: 'Convert',
    feat_5: 'Rotate',
    feat_6: 'Crop',
    examples_title: 'Examples',
    ex1: '“Dimensions and EXIF for this file?” → getImageInfo',
    ex2: '“Resize to width 1080” → resizeImage',
    ex3: '“Shrink for sharing” → compressImage',
    ex4: '“Convert to PNG / rotate 90°” → convertFormat or rotateImage',
    about_title: 'About',
    about_dev_label: 'Developer',
    about_dev: 'PandaGenie',
    about_ver_label: 'Version',
    about_ver: '1.0.0',
    about_perm_label: 'Permissions',
    about_permissions: 'Read and write image files at paths you provide'
  }
};
function applyI18n() {
  var l = (typeof _lang !== 'undefined' && i18n[_lang]) ? _lang : 'en';
  var t = i18n[l] || i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (t[k]) el.textContent = t[k];
  });
}
try { _lang = NativeBridge.getLanguage().substring(0,2); } catch(e) {
  _lang = navigator.language.substring(0,2) === 'zh' ? 'zh' : 'en';
}
applyI18n();
</script>
</body>
</html>
