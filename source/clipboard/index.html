<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Clipboard Manager</title>
<link rel="stylesheet" href="common.css">
<style>
  body.clipboard-skin { --page-accent: #D97706; --page-accent-soft: rgba(217, 119, 6, 0.12);
    background: linear-gradient(180deg, var(--page-accent-soft) 0%, var(--surface) 30%); }
  body.clipboard-skin .mod-header .icon { background: linear-gradient(145deg, var(--page-accent-soft), var(--surface-container)); }
  body.clipboard-skin .info-card h3 { color: var(--page-accent); }
  body.clipboard-skin .api-name { background: var(--page-accent-soft); color: var(--page-accent); }
  body.clipboard-skin .example-list li { border-left-color: var(--page-accent); }
  body.clipboard-skin .badge { background: var(--page-accent-soft); color: var(--page-accent); }
</style>
</head>
<body class="clipboard-skin">
<div class="mod-header">
  <div class="icon">📋</div>
  <h2 data-i18n="title"></h2>
  <p data-i18n="desc"></p>
  <p class="text-center mt-8"><span class="badge" data-i18n="module_badge"></span></p>
</div>
<div class="info-card">
  <h3 data-i18n="features_title"></h3>
  <div class="feature-grid">
    <div class="feature-item"><span class="emoji" aria-hidden="true">👁</span><span data-i18n="feat_1"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">✏️</span><span data-i18n="feat_2"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🕐</span><span data-i18n="feat_3"></span></div>
    <div class="feature-item"><span class="emoji" aria-hidden="true">🔎</span><span data-i18n="feat_4"></span></div>
  </div>
</div>
<div class="info-card">
  <h3 data-i18n="api_title"></h3>
  <ul class="api-list">
    <li><span class="api-name">getClipboard</span> — <span data-i18n="api_getClipboard"></span></li>
    <li><span class="api-name">setClipboard</span> — <span data-i18n="api_setClipboard"></span></li>
    <li><span class="api-name">clearClipboard</span> — <span data-i18n="api_clearClipboard"></span></li>
    <li><span class="api-name">getClipboardHistory</span> — <span data-i18n="api_getClipboardHistory"></span></li>
    <li><span class="api-name">saveToHistory</span> — <span data-i18n="api_saveToHistory"></span></li>
    <li><span class="api-name">searchHistory</span> — <span data-i18n="api_searchHistory"></span></li>
    <li><span class="api-name">clearHistory</span> — <span data-i18n="api_clearHistory"></span></li>
  </ul>
</div>
<div class="info-card">
  <h3 data-i18n="examples_title"></h3>
  <ul class="example-list">
    <li data-i18n="ex1"></li>
    <li data-i18n="ex2"></li>
    <li data-i18n="ex3"></li>
    <li data-i18n="ex4"></li>
  </ul>
  <h3 class="mt-12" data-i18n="usage_title"></h3>
  <p class="text-muted mt-8" data-i18n="usage_desc"></p>
</div>
<div class="info-card">
  <h3 data-i18n="about_title"></h3>
  <div class="about-row"><span class="label" data-i18n="about_dev_label"></span><span class="value" data-i18n="about_dev"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_ver_label"></span><span class="value" data-i18n="about_ver"></span></div>
  <div class="about-row"><span class="label" data-i18n="about_perm_label"></span><span class="value" data-i18n="about_permissions"></span></div>
</div>
<script>
var _lang = 'zh';
var i18n = {
  zh: {
    title: '剪贴板管理',
    desc: '读写剪贴板、管理剪贴板历史记录',
    api_title: '功能接口',
    api_getClipboard: '获取当前剪贴板中的文本内容',
    api_setClipboard: '将指定文本写入系统剪贴板',
    api_clearClipboard: '清空系统剪贴板（写入空文本）',
    api_getClipboardHistory: '读取本地保存的剪贴板历史（/sdcard/PandaGenie/data/clipboard/history.json），按时间从新到旧返回，limit 默认 20',
    api_saveToHistory: '将当前剪贴板文本追加到历史文件（去重与条数上限由模块内部处理）',
    api_searchHistory: '按关键词在历史记录中搜索文本内容',
    api_clearHistory: '清空本地剪贴板历史文件',
    usage_title: '使用方式',
    usage_desc: '在对话中用自然语言描述你的需求，AI 会自动调用本模块的功能。',
    module_badge: '剪贴板',
    features_title: '核心能力',
    feat_1: '读取剪贴板',
    feat_2: '写入剪贴板',
    feat_3: '历史记录',
    feat_4: '历史搜索',
    examples_title: '使用示例',
    ex1: '「剪贴板里是什么」→ getClipboard 返回当前文本',
    ex2: '「把这段话复制到剪贴板：…」→ setClipboard',
    ex3: '「搜历史里带发票的内容」→ searchHistory 关键词',
    ex4: '「列出最近 20 条剪贴板」→ getClipboardHistory（limit 可调整）',
    about_title: '关于本模块',
    about_dev_label: '开发者',
    about_dev: 'PandaGenie',
    about_ver_label: '版本',
    about_ver: '1.0.0',
    about_perm_label: '权限说明',
    about_permissions: '剪贴板访问与本地历史文件读写'
  },
  en: {
    title: 'Clipboard Manager',
    desc: 'Read/write the clipboard and manage clipboard history',
    api_title: 'API Reference',
    api_getClipboard: 'Get the current text on the clipboard',
    api_setClipboard: 'Write the given text to the system clipboard',
    api_clearClipboard: 'Clear the system clipboard (write empty text)',
    api_getClipboardHistory: 'Read locally saved clipboard history (/sdcard/PandaGenie/data/clipboard/history.json), newest first; limit defaults to 20',
    api_saveToHistory: 'Append current clipboard text to the history file (dedup and max entries handled inside the module)',
    api_searchHistory: 'Search history entries by keyword',
    api_clearHistory: 'Clear the local clipboard history file',
    usage_title: 'How to Use',
    usage_desc: 'Describe what you need in the chat, and the AI will automatically use this module.',
    module_badge: 'Clipboard',
    features_title: 'Highlights',
    feat_1: 'Read',
    feat_2: 'Write',
    feat_3: 'History',
    feat_4: 'Search',
    examples_title: 'Examples',
    ex1: '“What’s on my clipboard?” → getClipboard',
    ex2: '“Copy this to clipboard: …” → setClipboard',
    ex3: '“Search history for invoice” → searchHistory',
    ex4: '“Show my last 20 clips” → getClipboardHistory (adjust limit as needed)',
    about_title: 'About',
    about_dev_label: 'Developer',
    about_dev: 'PandaGenie',
    about_ver_label: 'Version',
    about_ver: '1.0.0',
    about_perm_label: 'Permissions',
    about_permissions: 'Clipboard access and local history file I/O'
  }
};
function applyI18n() {
  var l = (typeof _lang !== 'undefined' && i18n[_lang]) ? _lang : 'en';
  var t = i18n[l] || i18n.en;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var k = el.getAttribute('data-i18n');
    if (t[k]) el.textContent = t[k];
  });
}
try { _lang = NativeBridge.getLanguage().substring(0,2); } catch(e) {
  _lang = navigator.language.substring(0,2) === 'zh' ? 'zh' : 'en';
}
applyI18n();
</script>
</body>
</html>
